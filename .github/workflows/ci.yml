name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — ruff + pytest (SQLite & live Postgres RLS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: regis/backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Create non-superuser test role (RLS must apply to it)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -c "CREATE ROLE regis LOGIN PASSWORD 'regis' NOSUPERUSER NOCREATEDB NOCREATEROLE;"
          psql -h localhost -U postgres -c "CREATE DATABASE regis_test OWNER regis;"
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests + coverage (includes live-Postgres RLS hardening)
        env:
          REGIS_TEST_PG_URL: postgresql+psycopg://regis:regis@localhost:5432/regis_test
        run: pytest --cov=app --cov-report=term

  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: regis/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: regis/frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Build (includes TypeScript typecheck)
        run: npm run build
